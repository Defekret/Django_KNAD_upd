version: "3.9"

services:
  phone-store:
    build: .
    container_name: phone-store
    ports:
      - "8000:8000"
    volumes:
      - ./project/db.sqlite3:/app/db.sqlite3
      - ./project/media:/app/media
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
